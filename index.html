<!DOCTYPE html>
<html lang='zh-Hant'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>永續金融知識王 Pro</title>
    <style>
        :root { --primary: #2ecc71; --secondary: #3498db; --error: #e74c3c; --bg: #f4f7f6; --text: #2c3e50; --card-bg: white; --input-border: #ccc; --option-hover: #eef2f7; --progress-bg: #eee; }
        [data-theme='dark'] { --bg: #1a1a1a; --text: #f0f0f0; --card-bg: #2d2d2d; --input-border: #444; --option-hover: #3d3d3d; --progress-bg: #444; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
        #app { background: var(--card-bg); width: 100%; max-width: 650px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; }
        .hidden { display: none; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: var(--secondary); color: white; }
        .option-btn { background: var(--card-bg); color: var(--text); text-align: left; border: 1px solid var(--input-border); margin: 5px 0; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; }
        .correct { background: var(--primary) !important; color: white; }
        .wrong { background: var(--error) !important; color: white; }
        #progress { height: 8px; background: var(--progress-bg); border-radius: 4px; margin-bottom: 20px; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        .config-section { margin-bottom: 20px; padding: 15px; background: var(--bg); border-radius: 10px; }
        input[type='number'], input[type='text'], select { padding: 8px; border-radius: 5px; border: 1px solid var(--input-border); background: var(--card-bg); color: var(--text); }
        #wrong-list { margin-top: 20px; text-align: left; border-top: 2px solid var(--progress-bg); padding-top: 15px; max-height: 400px; overflow-y: auto; }
        .wrong-item { margin-bottom: 15px; padding: 10px; background: var(--bg); border-radius: 8px; font-size: 0.9em; }
        .wrong-q { font-weight: bold; margin-bottom: 5px; }
        .wrong-a { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
        <div id="start-screen">
            <h1>永續金融知識王 Pro</h1>
            
            <div class="config-section">
                <strong>使用者代號 (區分錯題)</strong><br>
                <input type="text" id="user-id" placeholder="請輸入您的 ID" style="width: 90%; margin-top:5px;">
            </div>

            <div class="config-section">
                <strong>1. 指定場次範圍 (1-6 場)</strong><br>
                從 <input type="number" id="exam-start" value="1" min="1" max="6">
                到 <input type="number" id="exam-end" value="6" min="1" max="6">
            </div>

            <div class="config-section">
                模式：<select id="game-mode"><option value="instant">即時挑戰</option><option value="exam">模擬考</option></select>
                題數：<input type="number" id="question-count" value="20">
            </div>

            <button class="btn btn-main" onclick="initGame('normal')">開始測驗</button>
            <button id="review-btn" class="btn btn-sub hidden" onclick="initGame('review')">複習我的錯題 (<span id="wrong-count">0</span>)</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="progress"><div id="progress-bar"></div></div>
            <div id="question-info"></div>
            <h3 id="question-text"></h3>
            <div id="options-container"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>測驗結束</h2>
            <p id="score-display"></p>
            <div id="wrong-list"></div>
            <button class="btn btn-main" onclick="location.reload()">回主選單</button>
        </div>
    </div>

    <script>
        const allData = [{"id": "1-1", "exam_id": 1, "question": "永續投資中金融業的角色為何？ 甲.符合股東及社會長期最佳利益；乙.引導資金流向永續發展相關項目；丙.協 助不利永續發展之產業轉型", "options": ["僅甲、乙", "僅甲、丙", "僅乙、丙", "甲、乙、丙皆是"], "correct_answer": 4, "explanation": ""}, {"id": "1-2", "exam_id": 1, "question": "上市上櫃公司永續發展實務守則中，上市上櫃公司之董事會於公司推動永續發展目標，內容不包含下列哪一項？", "options": ["鼓勵公司追求最大化短期獲利", "考量利害關係人之利益，提出永續發展使命或願景", "永續發展納入公司之營運活動與發展方向", "永續發展相關資訊揭露之即時性與正確性"], "correct_answer": 1, "explanation": ""}, {"id": "1-3", "exam_id": 1, "question": "金融業將ESG 規範納入決策機制，其用意包含下列何者？", "options": ["投資授信之參考，運用ESG 來審視投融資對象", "授信、投資或金融商品之業務方向，引導企業與投資人重視永續議題", "提升金融業的競爭力和長期價值", "以上皆是"], "correct_answer": 4, "explanation": ""}, {"id": "1-4", "exam_id": 1, "question": "因應企業碳盤查需求，對於盤查對象及查驗機構採哪一種方式管理？", "options": ["分類管理", "分群管理", "分級管理", "統一管理"], "correct_answer": 3, "explanation": ""}, {"id": "1-5", "exam_id": 1, "question": "歐盟的碳價除受政策干預外，係根據下列何者利用「污染者付費」的做法激勵企業從事減碳？", "options": ["碳排放量", "碳抵消的排放量", "碳洩漏的排放量", "碳權憑證的供需"], "correct_answer": 4, "explanation": ""}, {"id": "1-6", "exam_id": 1, "question": "我國推動上市櫃公司永續發展路徑圖，資本額 50 億元以下合併報表子公司完成確信須在哪一年完成？", "options": ["2024 年", "2027 年", "2028 年", "2029 年"], "correct_answer": 4, "explanation": ""}, {"id": "1-7", "exam_id": 1, "question": "聯合國政府間氣候變遷專門委員會(IPCC)目前已發布幾次評估報告(Assessment Report)？", "options": ["3 次", "4 次", "5 次", "6 次"], "correct_answer": 4, "explanation": ""}, {"id": "1-8", "exam_id": 1, "question": "1972 年 6 月，聯合國首次針對環境問題舉辦人類環境會議(Conference on the Human Environment)，該次會議 通過的宣言為以下何者？", "options": ["里約環境與發展宣言(Rio Declaration on Environment and Development)", "日內瓦部長宣言(The Geneva Ministerial Declaration)", "斯德哥爾摩宣言(Stockholm Declaration)", "格拉斯哥聯合宣言(Glasgow Declaration)"], "correct_answer": 3, "explanation": ""}, {"id": "1-9", "exam_id": 1, "question": "歐盟提及各經濟活動必須對六大環境目標中至少有幾項具有重大貢獻，才能算是永續發展活動？", "options": ["一項", "二項", "三項", "四項"], "correct_answer": 1, "explanation": ""}, {"id": "1-10", "exam_id": 1, "question": "上市上櫃公司永續發展實務守則中，上市上櫃公司之董事會於公司推動永續發展目標時，宜充分考量何者的利益？", "options": ["股 lanation": ""}, {"id": "6-72", "exam_id": 6, "question": "下列哪些是金融機構發展永續金融常見的作法？甲.將資金導入重視ESG 的企業；乙.不提供資金給對環境不良影響的企 業；丙.納入化石燃料及高汙染排放的產業投資；丁.提供資金協助企業淨零轉型", "options": ["僅甲、乙、丙", "僅乙、丙、丁", "僅甲、乙、丁", "甲、乙、丙、丁皆是"], "correct_answer": 3, "explanation": ""}, {"id": "6-73", "exam_id": 6, "question": "綠建築保險主要區分為三種類型，當損失發生時，由於保險公司會給予補貼，因此擁有甲類型綠建築保險的保戶會選擇 將綠建築升級，使用較環保的材料。請問甲類型為何？", "options": ["重置成本保障型", "營業中斷保障型", "相關費用保障型", "能源效率保險"], "correct_answer": 1, "explanation": ""}, {"id": "6-74", "exam_id": 6, "question": "如公司欲發行社會債券，應向櫃檯買賣中心申請並提交永續發展債券計畫書，請問下列何者非該計畫書應記載事項？", "options": ["發行人之整體永續發展策略概要資訊", "投資計畫之評估與篩選流程", "資金運用計畫", "可持續發展關鍵績效指標之選定"], "correct_answer": 4, "explanation": ""}, {"id": "6-75", "exam_id": 6, "question": "低碳金融之範疇包括？甲.氣候變遷減緩；乙.氣候變遷調適；丙.公司治理；丁.社會", "options": ["僅甲", "僅甲、乙", "僅甲、乙、丙", "甲、乙、丙、丁皆是"], "correct_answer": 1, "explanation": ""}, {"id": "6-76", "exam_id": 6, "question": "綠色汽車保險除了以里程數計費外，還可能向何者提供保費優惠？甲.碳排量較低的汽車；乙.油電混合車；丙.燃油效率 較差的汽車", "options": ["僅甲、乙", "僅乙、丙", "甲、乙、丙皆是", "甲、乙、丙皆非"], "correct_answer": 1, "explanation": ""}, {"id": "6-77", "exam_id": 6, "question": "請問綠色債券、社會責任債券、可持續發展債券，三者皆屬於下列何種類別？", "options": ["永續發展專項資金債券", "可持續發展連結債券", "永續發展投資級債券", "永續發展高收益債券"], "correct_answer": 1, "explanation": ""}, {"id": "6-78", "exam_id": 6, "question": "下列何者為永續連結貸款的條件？", "options": ["貸款方必須屬於綠色產業", "貸款方須屬於綠色產業，且不可有違反ESG 相關法規之前例", "貸款方可以是一般產業，但款項必須用在促進永續的用途", "貸款方可以是一般產業，但需要設定永續關鍵績效指標與目標"], "correct_answer": 4, "explanation": ""}, {"id": "6-79", "exam_id": 6, "question": "下列有關於ESG ETF 的敘述何者正確？", "options": ["追求短期高報酬", "採被動式投資", "只投資於大型企業", "可追蹤市場上任何一檔指數"], "correct_answer": 2, "explanation": ""}, {"id": "6-80", "exam_id": 6, "question": "若市場投資人專注於綠色科技公司的投資，並依據ESG 評等中的治理(G)評分來篩選企業，尤其關注董事會結構和公司 治理重大性議題。如果董事會出現利益衝突，這對其投資組合可能產生何種影響？", "options": ["治理評分下降，投資組合ESG 風險上升", "環境評分下降，投資組合ESG 風險上升", "治理評分上升，投資組合ESG 風險上升", "環境評分上升，投資組合ESG 風險下降"], "correct_answer": 1, "explanation": ""}];
        let userId = localStorage.getItem('esg_last_user') || 'default';
        document.getElementById('user-id').value = userId === 'default' ? '' : userId;

        let wrongPool = [];
        let currentPool = [], currentIdx = 0, score = 0, audioCtx = null, sessionWrongs = [];

        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('esg_theme', theme);
        }
        if(localStorage.getItem('esg_theme')==='dark') document.body.setAttribute('data-theme','dark');

        function playSound(f) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                o.start(); o.stop(audioCtx.currentTime + 0.2);
            } catch(e) {}
        }

        function updateReviewUI() {
            userId = document.getElementById('user-id').value.trim() || 'default';
            localStorage.setItem('esg_last_user', userId);
            const storageKey = 'esg_wrong_' + userId;
            wrongPool = JSON.parse(localStorage.getItem(storageKey) || '[]');

            const s = parseInt(document.getElementById('exam-start').value);
            const e = parseInt(document.getElementById('exam-end').value);
            const filtered = wrongPool.filter(q => q.exam_id >= s && q.exam_id <= e);
            const btn = document.getElementById('review-btn');
            if(filtered.length > 0) {
                btn.classList.remove('hidden');
                document.getElementById('wrong-count').innerText = filtered.length;
            } else {
                btn.classList.add('hidden');
            }
        }

        document.getElementById('user-id').addEventListener('input', updateReviewUI);
        document.getElementById('exam-start').addEventListener('change', updateReviewUI);
        document.getElementById('exam-end').addEventListener('change', updateReviewUI);
        updateReviewUI();

        function initGame(type) {
            userId = document.getElementById('user-id').value.trim() || 'default';
            const s = parseInt(document.getElementById('exam-start').value);
            const e = parseInt(document.getElementById('exam-end').value);
            const count = parseInt(document.getElementById('question-count').value);
            sessionWrongs = [];

            if(type === 'review') {
                currentPool = wrongPool.filter(q => q.exam_id >= s && q.exam_id <= e).sort(() => Math.random() - 0.5);
            } else {
                currentPool = allData.filter(q => q.exam_id >= s && q.exam_id <= e).sort(() => Math.random() - 0.5).slice(0, count);
            }

            if(!currentPool.length) return alert('此範圍無題目');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = currentPool[currentIdx];
            document.getElementById('question-info').innerText = `使用者: ${userId} | 場次: ${q.exam_id} | 題目 ${currentIdx+1}/${currentPool.length}`;
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = (i+1) + '. ' + opt;
                b.onclick = () => handleSelect(i, b, q);
                container.appendChild(b);
            });
            document.getElementById('progress-bar').style.width = (currentIdx/currentPool.length*100) + '%';
        }

        function handleSelect(i, b, q) {
            if(b.classList.contains('correct') || document.querySelector('.option-btn.correct')) return;
            const ans = q.correct_answer;
            const isCorrect = Array.isArray(ans) ? ans.includes(i+1) : (i+1) === ans;

            if(isCorrect) {
                b.classList.add('correct');
                if(!document.querySelector('.option-btn.wrong')) score++;
                playSound(880);
                setTimeout(() => {
                    currentIdx++;
                    if(currentIdx < currentPool.length) showQuestion();
                    else showResult();
                }, 800);
            } else {
                if(!b.classList.contains('wrong')) {
                    b.classList.add('wrong');
                    playSound(220);
                    if(!sessionWrongs.some(item => item.id === q.id)) sessionWrongs.push(q);
                    if(!wrongPool.some(x => x.id === q.id)) {
                        wrongPool.push(q);
                        localStorage.setItem('esg_wrong_' + userId, JSON.stringify(wrongPool));
                    }
                }
            }
        }

        function showResult() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerHTML = `您的得分：${score} / ${currentPool.length}`;

            const list = document.getElementById('wrong-list');
            list.innerHTML = sessionWrongs.length > 0 ? '<h3>錯題複習清單：</h3>' : '';
            sessionWrongs.forEach(q => {
                const div = document.createElement('div');
                div.className = 'wrong-item';
                const correctText = Array.isArray(q.correct_answer) ? q.correct_answer.join(', ') : q.correct_answer;
                const correctContent = Array.isArray(q.correct_answer)
                    ? q.correct_answer.map(idx => q.options[idx-1]).join(' / ')
                    : q.options[q.correct_answer-1];
                div.innerHTML = `<div class="wrong-q">${q.question}</div><div class="wrong-a">正確答案：(${correctText}) ${correctContent}</div>`;
                list.appendChild(div);
            });
        }
    </script>
