let currentQuiz = [];
let currentIdx = 0;
let mode = 1;
let userId = '';
let currentExamWrongQuestions = [];

function startQuiz(selectedMode) {
    userId = document.getElementById('user-id').value || 'Guest';
    mode = selectedMode;
    const count = parseInt(document.getElementById('q-count').value);
    currentQuiz = [...rawQuizData].sort(() => 0.5 - Math.random()).slice(0, count);
    initQuiz();
}

function initQuiz() {
    currentIdx = 0;
    currentExamWrongQuestions = [];
    document.getElementById('home-page').classList.add('hidden');
    document.getElementById('quiz-page').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    const q = currentQuiz[currentIdx];
    document.getElementById('question-text').innerText = `(${currentIdx+1}/${currentQuiz.length}) ${q.question}`;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    document.getElementById('feedback').innerText = '';

    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(i, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(choice, btn) {
    const q = currentQuiz[currentIdx];
    // 修正邏輯：如果 correct_answer 是陣列，則檢查 choice 是否包含在內
    const isCorrect = Array.isArray(q.correct_answer) ? q.correct_answer.includes(choice) : choice === q.correct_answer;

    if (mode === 1) {
        if (isCorrect) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = '答對了！' + (q.explanation ? ' (' + q.explanation + ')' : '');
            setTimeout(() => nextQuestion(), 800);
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = '答案錯誤，請再試一次';
            if (!currentExamWrongQuestions.some(item => item.id === q.id)) currentExamWrongQuestions.push(q);
        }
    } else {
        if (!isCorrect) currentExamWrongQuestions.push(q);
        nextQuestion();
    }
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < currentQuiz.length) showQuestion();
    else finishQuiz();
}

function finishQuiz() {
    document.getElementById('quiz-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    const history = JSON.parse(localStorage.getItem('quiz_history_' + userId) || '[]');
    const examId = history.length + 1;
    history.push({ examId, wrongQuestions: currentExamWrongQuestions });
    localStorage.setItem('quiz_history_' + userId, JSON.stringify(history));
    const resDiv = document.getElementById('result-list');
    resDiv.innerHTML = `<p>考試編號：${examId}</p><p>錯題數：${currentExamWrongQuestions.length}</p>`;
    currentExamWrongQuestions.forEach(q => {
        const correctLabel = Array.isArray(q.correct_answer) ? '全部選項均給分' : q.options[q.correct_answer];
        resDiv.innerHTML += `<div class='history-item'><b>題目：</b>${q.question}<br><b>正解：</b>${correctLabel}</div>`;
    });
}

function startReview() {
    userId = document.getElementById('user-id').value || 'Guest';
    const start = parseInt(document.getElementById('rev-start').value);
    const end = parseInt(document.getElementById('rev-end').value);
    const history = JSON.parse(localStorage.getItem('quiz_history_' + userId) || '[]');
    let reviewSet = [];
    history.forEach(h => { if (h.examId >= start && h.examId <= end) reviewSet = [...reviewSet, ...h.wrongQuestions]; });
    if (reviewSet.length > 0) {
        currentQuiz = Array.from(new Set(reviewSet.map(q => q.id))).map(id => reviewSet.find(q => q.id === id));
        mode = 1;
        initQuiz();
    } else { alert('找不到該範圍的錯題'); }
}
